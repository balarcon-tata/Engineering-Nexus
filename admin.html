<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Actualizar Rutas Activas | TATA</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #090b0f;
      color: #f6f7fb;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      color: #aeb6c2;
      line-height: 1.5;
    }

    input, button {
      width: 100%;
      min-height: 46px;
      margin-top: 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 10px 14px;
      font-size: 1rem;
    }

    input {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    button {
      cursor: pointer;
      background: linear-gradient(135deg, #b3202d, #ff4255);
      color: white;
      font-weight: 800;
      border: 0;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 8px;
      background: rgba(255,255,255,0.07);
      color: #d9dee8;
      white-space: pre-wrap;
    }

    .ok { color: #9ff0c5; }
    .error { color: #ff9aa5; }
    .warn { color: #ffd68c; }
  </style>
</head>

<body>
  <main class="card">
    <h1>Actualizar Rutas Activas</h1>

    <p>
      Selecciona el archivo <strong>DP070 - Rutas Activas.xlsx</strong>.
      El sistema ignorará la primera fila, leerá los encabezados desde la segunda fila
      y reemplazará la tabla completa en Supabase.
    </p>

    <input type="file" id="excelFile" accept=".xlsx,.xls" />

    <button id="uploadBtn">
      Actualizar base de datos
    </button>

    <div id="lastUpdate" class="status">
      Última actualización: consultando...
    </div>
    
    <div id="status" class="status">
      Esperando archivo...
    </div>
  </main>

  <script>
    const SUPABASE_URL = "https://ezhlltgcqektrclgzhfi.supabase.co";
    const SUPABASE_KEY = "sb_publishable_QnmVt7kK6LTX6HqY3eJcUg_wTN-O6Hp";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

    const fileInput = document.getElementById("excelFile");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusBox = document.getElementById("status");
    const lastUpdateBox = document.getElementById("lastUpdate");
    const PROCESO_ACTUALIZACION = "RUTAS_ACTIVAS";

    function setStatus(message, type = "") {
      statusBox.className = "status " + type;
      statusBox.textContent = message;
    }

    async function cargarUltimaActualizacion() {
      const { data } = await supabaseClient
        .from("control_actualizaciones")
        .select("fecha_actualizacion, registros")
        .eq("proceso", PROCESO_ACTUALIZACION)
        .single();
    
      if (!data) {
        lastUpdateBox.textContent = "Última actualización: nunca";
        return;
      }
    
      const fecha = new Date(
        data.fecha_actualizacion
      ).toLocaleString("es-GT");
    
      lastUpdateBox.textContent =
        `Última actualización: ${fecha}
    Registros cargados: ${data.registros ?? "N/D"}`;
    }
    
    async function guardarRegistroActualizacion(registros) {
      const { error } = await supabaseClient
        .from("control_actualizaciones")
        .upsert({
          proceso: PROCESO_ACTUALIZACION,
          fecha_actualizacion: new Date().toISOString(),
          registros
        });
    
      if (error) throw error;
    }

    function excelDateToISO(value) {
      if (!value) return null;

      if (value instanceof Date) {
        return value.toISOString();
      }

      if (typeof value === "number") {
        const date = XLSX.SSF.parse_date_code(value);
        if (!date) return null;

        const jsDate = new Date(
          Date.UTC(date.y, date.m - 1, date.d, date.H || 0, date.M || 0, date.S || 0)
        );

        return jsDate.toISOString();
      }

      const parsed = new Date(value);
      if (!isNaN(parsed)) return parsed.toISOString();

      return null;
    }

    function cleanNumber(value) {
      if (value === undefined || value === null || value === "") return null;

      if (typeof value === "number") return value;

      const cleaned = String(value)
        .replace(",", ".")
        .trim();

      const number = Number(cleaned);

      return isNaN(number) ? null : number;
    }

    function cleanText(value) {
      if (value === undefined || value === null) return null;
      return String(value).trim();
    }

    function chunkArray(array, size) {
      const chunks = [];

      for (let i = 0; i < array.length; i += size) {
        chunks.push(array.slice(i, i + size));
      }

      return chunks;
    }

    uploadBtn.addEventListener("click", async () => {
      try {
        const file = fileInput.files[0];

        if (!file) {
          setStatus("Selecciona primero el archivo Excel.", "warn");
          return;
        }

        uploadBtn.disabled = true;
        setStatus("Leyendo archivo Excel...");

        const arrayBuffer = await file.arrayBuffer();

        const workbook = XLSX.read(arrayBuffer, {
          type: "array",
          cellDates: true
        });

        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];

        const rows = XLSX.utils.sheet_to_json(sheet, {
          range: 1,
          defval: null
        });

        if (!rows.length) {
          throw new Error("No se encontraron datos. Revisa que el archivo tenga información desde la fila 3.");
        }

        setStatus(`Archivo leído correctamente.\nFilas detectadas: ${rows.length}\nPreparando registros...`);

        const registros = rows
          .map(row => ({
            id_ruta: cleanNumber(row["ID Ruta"]),
            fecha_creacion: excelDateToISO(row["Fecha de Creación"]),
            estilo: cleanNumber(row["Estilo"]),
            id_sam: cleanNumber(row["ID SAM"]),
            etapa: cleanText(row["Etapa"]),
            id_operacion: cleanNumber(row["ID Operación"]),
            operacion: cleanText(row["Operación"]),
            secuencia: cleanNumber(row["Sequencia"]),
            etapa_operacion: cleanText(row["Etapa Operación"]),
            sah: cleanNumber(row["SAH"]),
            sam: cleanNumber(row["SAM"])
          }))
          .filter(row => row.id_ruta !== null || row.id_sam !== null || row.operacion !== null);

        if (!registros.length) {
          throw new Error("No se generaron registros válidos para insertar.");
        }

        setStatus(`Registros preparados: ${registros.length}\nEliminando datos anteriores...`);

        const { error: deleteError } = await supabaseClient
          .from("rutas_activas")
          .delete()
          .neq("id", 0);

        if (deleteError) {
          throw deleteError;
        }

        const chunks = chunkArray(registros, 500);

        for (let i = 0; i < chunks.length; i++) {
          setStatus(
            `Insertando datos en Supabase...\nBloque ${i + 1} de ${chunks.length}\nRegistros totales: ${registros.length}`
          );

          const { error: insertError } = await supabaseClient
            .from("rutas_activas")
            .insert(chunks[i]);

          if (insertError) {
            throw insertError;
          }
        }

        await guardarRegistroActualizacion(registros.length);
        await cargarUltimaActualizacion();
        
        setStatus(
          `Actualización completada correctamente.\n\nRegistros cargados: ${registros.length}\nHoja procesada: ${sheetName}`,
          "ok"
        );

      } catch (error) {
        console.error(error);
        setStatus(
          "Error al actualizar la base de datos:\n\n" + error.message,
          "error"
        );
      } finally {
        uploadBtn.disabled = false;
      }
    });
    cargarUltimaActualizacion();
  </script>
</body>
</html>
